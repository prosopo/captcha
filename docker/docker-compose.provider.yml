services:
  provider1:
    container_name: provider1
    profiles:
      - production
      - staging
    image: prosopo/provider:${COMPOSE_PROVIDER_IMAGE_VERSION}
    labels:
      - "vector.provider=true" # enable logging as a provider
      - "vector.docker=true" # log docker events
    restart: unless-stopped # unless the container has been stopped, it will be restarted, even on reboot
    pull_policy: always
    env_file:
      - ../.env.1.${NODE_ENV}
    volumes:
      # Detector bundle pool, host-mounted so a pushed pool survives container
      # restarts. Never bake this into the image: prosopo/provider is a public
      # Docker Hub image and every bundle ships with its own RSA private key.
      # provider1 and provider2 run different image versions, so they each get
      # their own pool — bundles stamped with another release are skipped at
      # load (PROSOPO_DETECTOR_POOL_RELEASE).
      - ./data/detector-pool.1:/app/data/detector-pool
    ports:
      - '127.0.0.1:9229:9229'
    networks:
      external:
      internal:
        ipv4_address: 172.18.0.3
        ipv6_address: fd00:aaaa::3
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '1'
    healthcheck:
      test: [ "CMD", "curl", "--fail", "localhost:9229/healthz" ] # ping the healthz endpoint
      interval: 5m
      retries: 3
      start_period: 30s
      timeout: 10s
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 208.67.222.222
  provider2:
    container_name: provider2
    profiles:
      - production
      - staging
    image: prosopo/provider:${COMPOSE_PROVIDER_PREVIOUS_IMAGE_VERSION}
    labels:
      - "vector.provider=true" # enable logging as a provider
      - "vector.docker=true" # log docker events
    restart: unless-stopped # unless the container has been stopped, it will be restarted, even on reboot
    pull_policy: build
    env_file:
      - ../.env.2.${NODE_ENV}
    volumes:
      # See provider1 — separate pool because this container runs the previous
      # image version.
      - ./data/detector-pool.2:/app/data/detector-pool
    ports:
      - '127.0.0.1:9339:9339'
    networks:
      external:
      internal:
        ipv4_address: 172.18.0.7
        ipv6_address: fd00:aaaa::7
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '1'
    healthcheck:
      test: [ "CMD", "curl", "--fail", "localhost:9339/healthz" ] # ping the healthz endpoint
      interval: 5m
      retries: 3
      start_period: 30s
      timeout: 10s
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 208.67.222.222
  database:
    container_name: database
    profiles:
      - production
      - staging
    image: mongo:6.0.28
    command: mongod --wiredTigerCacheSizeGB 2.0
    deploy:
      resources:
        limits:
          # Total container ceiling (Cache + overhead)
          memory: 3G
    labels:
      - "vector.mongo=true" # enable logging as a provider
      - "vector.docker=true" # log docker events
    restart: unless-stopped # unless the container has been stopped, it will be restarted, even on reboot
    volumes:
      - /data/db:/data/db
    ports:
      - '127.0.0.1:27017:27017'
    env_file:
      - ../.env.1.${NODE_ENV}
    networks:
      external:
      internal:
        ipv4_address: 172.18.0.5
        ipv6_address: fd00:aaaa::5
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '1'
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')", "--quiet" ] # ping the mongo server
      interval: 5m
      retries: 3
      start_period: 30s
      timeout: 10s
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 208.67.222.222
  caddy:
    container_name: caddy
    profiles:
      - production
      - staging
    image: prosopo/caddy:${CADDY_IMAGE}
    env_file:
      - ../.env.1.${NODE_ENV}
    labels:
      - "vector.caddy=true" # enable logging as caddy
      - "vector.docker=true" # log docker events
    restart: unless-stopped # unless the container has been stopped, it will be restarted, even on reboot
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "[::]:80:80"
      - "[::]:443:443"
    volumes:
      - ./provider.Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      # PEM for the load-balanced pronode.prosopo.io hostname. The cert
      # getter (pronode4) obtains it via certbot DNS-01 against Bunny,
      # then provider.yml's distribute step rsyncs it to every pronode
      # under ./certs/pronode-global/. The site block in
      # provider.cert-getter.Caddyfile references the path inside the
      # container. KEEP THIS MOUNT — removing it breaks TLS for the
      # global hostname on the next `up --force-recreate` even though
      # an already-running container keeps the old mount alive.
      - ./certs/pronode-global:/certs/pronode-global:ro
    networks:
      external:
      internal:
        ipv4_address: 172.18.0.6
        ipv6_address: fd00:aaaa::6
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '1'
    healthcheck:
      test: [ "CMD", "curl", "--fail", "localhost:2019/metrics" ] # ping the caddy admin api
      interval: 5m
      retries: 3
      start_period: 30s
      timeout: 10s
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 208.67.222.222
  redis-stack:
    container_name: redis-stack
    # unlike "redis/redis-stack-server" this image includes Insights
    image: redis/redis-stack:${REDIS_IMAGE}
    env_file:
      - ../.env.1.${NODE_ENV}
    volumes:
      - ./data:/data # mount a volume for data persistence
      - ./redis.conf:/redis-stack.conf
    ports:
      - '127.0.0.1:6379:6379' # DB
    networks:
      internal:
        ipv4_address: 172.18.0.8
        ipv6_address: fd00:aaaa::8
  vector:
    container_name: vector
    profiles:
      - production
      - staging
    image: prosopo/vector:${VECTOR_IMAGE}
    env_file:
      - ../.env.1.${NODE_ENV}
    labels:
      - "vector.docker=true" # log docker events
    restart: unless-stopped # unless the container has been stopped, it will be restarted, even on reboot
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # needed for monitoring docker container events, e.g. start/stop/etc
    networks:
      external:
      internal:
        ipv4_address: 172.18.0.9
        ipv6_address: fd00:aaaa::9
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '1'
    healthcheck:
      test: [ "CMD", "curl", "--fail", "localhost:8686/health" ]
      interval: 30s
      timeout: 10s
      retries: 1
      start_period: 10s
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 208.67.222.222
  ipinfo:
    # IP metadata sidecar
    container_name: ipinfo
    image: prosopo/ipinfo:${IPINFO_VERSION:-0.1.0}
    # NET_ADMIN is required to check/create firewall chains, even when
    # enableFirewall is false in config.
    cap_add:
      - NET_ADMIN
    # No host ports
    expose:
      - "3899"
    networks:
      - internal
    volumes:
      # Database blob ships separately
      - ./ipinfo/ipapi_database_ram:/usr/src/app/ipapi_database_ram:ro
      # Config override
      - ./ipinfo/config:/usr/src/app/config:ro
  dns:
    # DNS observation sidecar. Caddy fronts TLS for *.t.{CADDY_DOMAIN}
    # and reverse-proxies HTTP to this container — see provider.Caddyfile.
    container_name: dns
    profiles:
      - production
      - staging
    image: prosopo/dns:${DNS_VERSION?DNS_VERSION must be set}
    cap_add:
      - NET_BIND_SERVICE
    env_file:
      - ../.env.1.${NODE_ENV}
    ports:
      # Bind on the host's external IPv4 specifically — systemd-resolved
      # already claims 0.0.0.0:53 indirectly via stub-resolver iptables.
      # ${HOST_IPV4} is exported by the ansible playbook.
      - "${HOST_IPV4}:53:53/udp"
      - "${HOST_IPV4}:53:53/tcp"
      # No host port for the HTTPS pixel: Caddy's layer4 block on :443
      # SNI-routes `*.t.{CADDY_DOMAIN}` straight to dns:443 over the
      # docker network. URLs no longer carry a :9362 suffix.
    environment:
      - DNS_HTTPS_PORT=443
      - DNS_HTTPS_BIND=0.0.0.0
      # Caddy `layer4` raw-proxies *.t.{CADDY_DOMAIN} to dns:443 with a
      # PROXY v2 header so the sidecar sees the real client peer instead
      # of Caddy's docker bridge address. Must be paired with
      # `proxy_protocol v2` on the @dns_subzone route in provider.Caddyfile.
      - DNS_PROXY_PROTOCOL=1
      # Dual-stack: serve AAAA pointing at the host's public ipv6
      # alongside the existing A record. Without this, v6-preferring
      # browsers happy-eyeballs back to v4 for the pixel and
      # `dnsEvent.peerIp` records the v4 exit instead of the real v6.
      # Unset on v4-only hosts — the sidecar (≥0.1.7) treats blank as
      # "no AAAA" and serves A only.
      - DNS_AAAA_RECORD=${HOST_IPV6:-}
      # Tight shipper batch flush. Default 1000ms adds ~500ms average
      # buffering latency to every dnsEvent on the way to provider1's
      # admin endpoint. Empty batches are skipped (see shipper.rs), so
      # the cost on idle hosts is just a tokio tick wakeup. Real POST
      # volume is bounded by the event rate, not the flush rate.
      - DNS_SHIPPER_FLUSH_MS=50
    volumes:
      - /data/dns:/data
      # dns-tenants.json is rendered per host by ansible
      # (playbooks/provider.yml) before `compose up`. Pronodes come and
      # go independently; a single repo-checked-in file would make every
      # host re-deploy on every tenant change. The file is .gitignored.
      - ./dns-tenants.json:/etc/dns/tenants.json:ro
    networks:
      external:
      internal:
        ipv4_address: 172.18.0.10
        ipv6_address: fd00:aaaa::a
    restart: unless-stopped
networks:
  internal:
    enable_ipv6: true
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.18.0.0/16
          gateway: 172.18.0.1
        - subnet: fd00:aaaa::/64
          gateway: fd00:aaaa::1

  external:
    enable_ipv6: true
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.19.0.0/16
          gateway: 172.19.0.1
        - subnet: fd00:bbbb::/64
          gateway: fd00:bbbb::1
volumes:
  caddy_data:
  caddy_config:
