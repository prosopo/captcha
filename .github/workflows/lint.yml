# Lint the codebase

name: lint

on:
  pull_request:
    branches: [main, dev, staging, release/*]
    types:
      - opened # when a PR is opened
      - synchronize # when a PR is pushed to
      - reopened # when a PR is reopened
      - ready_for_review # when a PR is marked as ready for review (e.g. taken off draft mode)
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.PROSOPONATOR_PAT }}
  GH_TOKEN: ${{ secrets.PROSOPONATOR_PAT }}
  CARGO_TERM_COLOR: always
  NODE_OPTIONS: "--max-old-space-size=4096"

defaults:
  run:
    shell: bash

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Print contexts
        uses: prosopo/github_actions/.github/actions/print_contexts@2394d5e7a22fc39b15dadb7c4154b0ee0c36dec3 # split-npm-turbo-caches
        with:
          INPUTS_CONTEXT: ${{ toJson(inputs) }}
          NEEDS_CONTEXT: ${{ toJson(needs) }}
          VARS_CONTEXT: ${{ toJson(vars) }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}

      - name: Set NX_PARALLEL environment variable
        run: echo "NX_PARALLEL=$(nproc)" >> $GITHUB_ENV

      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.PROSOPONATOR_PAT }}
          submodules: "recursive"

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      # restore the turbo build cache (separate from the npm cache; populated
      # by cache.yml on push:main and keyed under the turbo-<os>-<arch>- prefix)
      - uses: prosopo/github_actions/.github/actions/restore_turbo_cache@2394d5e7a22fc39b15dadb7c4154b0ee0c36dec3 # split-npm-turbo-caches
      - uses: prosopo/github_actions/.github/actions/npm@2394d5e7a22fc39b15dadb7c4154b0ee0c36dec3 # split-npm-turbo-caches
        with:
          npm_ci_args: '--include=dev --no-audit --no-fund --prefer-offline'

      - run: npx turbo run @prosopo/lint#build

      - run: npm run lint

